name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        env:
          # Site is served on the apex custom domain. build.mjs derives basePath
          # from the origin URL — with no path component, basePath stays empty,
          # so every /asset/... reference remains root-relative.
          SITE_ORIGIN: https://flutteraudit.com
          # CI=1 fails the build on lingering REPLACE_ME placeholders.
          # Disabled here for the first deploy; flip on once Formspree is set.
          CI: "0"
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
