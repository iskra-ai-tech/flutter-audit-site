<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Received — Flutter App Audit</title>
<link rel="canonical" href="https://flutteraudit.com/">
<style>
  :root { color-scheme: dark; }
  html,body{margin:0;padding:0;background:#0E1014;color:#F4F4F6;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased}
  main{min-height:100dvh;display:grid;place-items:center;padding:48px}
  .wrap{max-width:560px}
  .eyebrow{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:#9C9DA4;margin:0 0 22px}
  .eyebrow b{color:#D9A463;font-weight:500}
  h1{font-size:clamp(2.2rem,5vw,3.4rem);font-weight:600;letter-spacing:-.025em;line-height:1.04;margin:0 0 22px}
  p{font-size:1.05rem;line-height:1.55;color:#c8c9ce;max-width:46ch;margin:0 0 18px}
  .meta{margin-top:36px;font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:.78rem;color:#6f7176;letter-spacing:.05em}
  a.cta{display:inline-flex;align-items:center;gap:10px;padding:14px 22px;border:1px solid #D9A463;color:#F4F4F6;background:transparent;border-radius:6px;text-decoration:none;font-weight:500;transition:background .2s ease;margin-top:14px}
  a.cta:hover{background:#D9A463;color:#0E1014}
  a.cta svg{width:14px;height:14px}
</style>
</head>
<body>
<main>
  <div class="wrap">
    <p class="eyebrow"><b>08</b> &nbsp;/&nbsp; Received</p>
    <h1>Got it.</h1>
    <p>You will hear from me within 24 hours, even if the answer is &ldquo;I am not the right fit.&rdquo;</p>
    <p>If your repo is private, I will reply with a GitHub handle to invite as a read-only collaborator. NDA before code changes hands, on request.</p>
    <a class="cta" href="/">
      Back to the audit
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M2 7h10M8 3l4 4-4 4"/></svg>
    </a>
    <p class="meta">flutteraudit.com</p>
  </div>
</main>
</body>
</html>
